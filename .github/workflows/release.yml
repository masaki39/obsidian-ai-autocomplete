name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required to generate artifact attestations (build provenance) for the
      # release assets, so users can cryptographically verify they were built
      # from this repository.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Build plugin
        run: |
          pnpm install
          pnpm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          notes_file="changelog/${tag}.md"

          assets="main.js manifest.json"
          if [ -s styles.css ]; then
            assets="$assets styles.css"
          fi

          if [ -f "$notes_file" ]; then
            gh release create "$tag" \
              --title="$tag" \
              --notes-file="$notes_file" \
              $assets
          else
            gh release create "$tag" \
              --title="$tag" \
              $assets
          fi
